name: Policy Checks

on:
  pull_request:

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f docs/product-constitution.md
          test -f docs/system-architecture.md
          test -f docs/test-plan.md
